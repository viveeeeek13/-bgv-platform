# render.yaml — Deploy backend to Render.com
services:
  - type: web
    name: bgv-platform-api
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false        # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false        # Set this in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false        # e.g. https://bgv-platform.vercel.app
